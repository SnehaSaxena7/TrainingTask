<!DOCTYPE html>
<html>
<head>
<title>Array Functions</title>
</head>

<body>

<h2>Array Functions Example</h2>

<script>

let fruits = ["Apple", "Banana", "Mango"];

document.write("Original Array: " + fruits + "<br><br>");

fruits.push("Orange");
document.write("After Push: " + fruits + "<br><br>");

fruits.pop();
document.write("After Pop: " + fruits + "<br><br>");

fruits.shift();
document.write("After Shift: " + fruits + "<br><br>");

fruits.unshift("Grapes");
document.write("After Unshift: " + fruits + "<br><br>");

let newArray = fruits.slice(1,3);
document.write("Slice: " + newArray + "<br><br>");

fruits.splice(1,1,"Kiwi");
document.write("After Splice: " + fruits + "<br><br>");

document.write("Index of Kiwi: " + fruits.indexOf("Kiwi") + "<br><br>");

document.write("Includes Banana: " + fruits.includes("Banana") + "<br><br>");

fruits.reverse();
document.write("After Reverse: " + fruits + "<br><br>");

fruits.sort();
document.write("After Sort: " + fruits);

</script>

</body>
</html>
